<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tab Archiver</title>
    <style>
        body {
            width: 300px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            padding: 16px;
            margin: 0;
            background: #f9f9f9;
            color: #333;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 12px;
            text-align: center;
            color: #2c3e50;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary {
            background-color: #3367d6;
            /* Google Blue-ish */
            color: white;
        }

        .btn-primary:hover {
            background-color: #2850a7;
        }

        .btn-secondary {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background-color: #d0d0d0;
        }

        .links {
            margin-top: 12px;
            text-align: center;
            font-size: 13px;
        }

        a {
            color: #3367d6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>Tab Archiver</h1>

    <button id="archiveWindow" class="btn-primary">Archive This Window</button>
    <button id="archiveAll" class="btn-primary">Archive All Windows</button>

    <div class="links">
        <a href="history.html" target="_blank">View History</a>
    </div>

    <script src="popup.js"></script>
</body>

</html>
